services:
  docker-monitor:
    image: ghcr.io/aldarondo/docker-monitor:latest
    container_name: docker-monitor
    restart: unless-stopped
    environment:
      - GH_PAT=${GH_PAT}
      - USE_DOCKER_SOCKET=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
