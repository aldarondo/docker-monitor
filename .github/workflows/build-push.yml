name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 04:00 UTC — rebuild with latest base image + dependencies
    - cron: '0 4 * * 1'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/aldarondo/docker-monitor:latest

      - name: Deploy to NAS
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST_IP }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASS }}
          port: 2222
          script: |
            echo "${{ secrets.NAS_PASS }}" | sudo -S /usr/local/bin/docker compose \
              -f /volume1/docker/docker-monitor/docker-compose.yml pull
            echo "${{ secrets.NAS_PASS }}" | sudo -S /usr/local/bin/docker compose \
              -f /volume1/docker/docker-monitor/docker-compose.yml up -d
