name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 04:00 UTC — rebuild with latest base image + dependencies
    - cron: '0 4 * * 1'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/aldarondo/docker-monitor:latest
